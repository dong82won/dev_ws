# boxbot_bringup/config/mapper_params_online_async.yaml
slam_toolbox:
  ros__parameters:

    # 1. 시뮬레이션 필수 설정
    use_sim_time: true          # 가제보를 사용할 때는 무조건 true여야 합니다.

    # 2. 핵심 좌표계 (TF) 설정 - 앞서 만든 EKF 설정과 일치해야 합니다!
    odom_frame: odom            # EKF가 만들어내는 기준 프레임
    map_frame: map              # SLAM이 만들어낼 지도 프레임
    base_frame: base_footprint  # 로봇의 중심 프레임 (URDF에 따라 base_link일 수도 있음)
    scan_topic: /scan           # 가제보에서 나오는 라이다(LiDAR) 토픽 이름

    # 3. 동작 모드
    mode: mapping               # 지도를 그리는 모드 (나중에 내비게이션 할 때는 'localization'으로 변경)

    # 4. 지도 업데이트 주기 및 해상도
    map_update_interval: 5.0    # 지도를 갱신하는 주기 (초 단위)
    resolution: 0.05            # 지도의 해상도 (1픽셀 = 5cm)

    # 5. 스캔 매칭 (Scan Matching) 파라미터
    max_laser_range: 20.0       # 라이다 센서의 최대 측정 거리 (가제보 라이다 스펙에 맞춤)
    minimum_time_interval: 0.5  # 스캔 데이터를 처리하는 최소 시간 간격
    transform_timeout: 0.2      # TF 데이터를 기다리는 최대 시간
    tf_buffer_duration: 30.0
    stack_capacity: 40000000

    # 6. 루프 클로저 (Loop Closure) - 오차 보정
    do_loop_closing: true       # 지나온 길을 다시 만났을 때 오차를 보정할지 여부
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.15
    loop_match_minimum_response_fine: 0.45
# camera/realsense_node 경로에 맞춰 작성
/camera/realsense_node:
  ros__parameters:
    # --- 장치 기본 설정 ---
    initial_reset: false      # 시작 시 장치 초기화 (연결 안정성)
                              # 이미 에러가 난 상태에서 리셋하면 연결이 더 꼬일 수 있음    
    device_type: 'd435i'              # 장치 모델 지정

    # --- 해상도 및 프레임 속도 (USB 3.0 권장 설정) ---
    depth_module:
      depth_profile: 640x480x30       # Depth 해상도 및 FPS
      enable_auto_exposure: true      # 자동 노출 활성화

    rgb_camera:
      color_profile: 640x480x30       # RGB 해상도 및 FPS
      enable_auto_exposure: true      # 자동 노출 활성화

    # --- 핵심 기능 활성화 ---
    enable_depth: true                # 깊이 데이터 활성화
    enable_color: true                # 컬러 데이터 활성화
    enable_infra1: false              # 적외선1 비활성화 (대역폭 절약)
    enable_infra2: false              # 적외선2 비활성화

    # --- 데이터 정렬 및 포인트클라우드 ---
    align_depth.enable: true          # Depth를 RGB 좌표계로 정렬 (필수!)
    pointcloud.enable: true           # 3D 점군 데이터 발행
    pointcloud.ordered_pc: false      # 정렬된 점군 여부
    pointcloud.stream_filter: 2       # <--- 이 줄을 추가하세요! (2번은 Color를 의미함)

    # --- IMU (가속도계 & 자이로스코프) 설정 ---
    enable_gyro: true                 # 자이로 활성화
    enable_accel: true                # 가속도계 활성화
    unite_imu_method: 2               # 0:None, 1:Copy, 2:Linear Interpolation (추천)
    # gyro_fps: 200                     # IMU 샘플링 속도 (Madgwick 필터에 적합)
    # accel_fps: 200
    # qos_imu: 'SENSOR_DATA'
    # --- 필터 및 데이터 정제 ---
    clip_distance: 4.0                # 4미터 이상의 데이터는 절단 (노이즈 방지)
    allow_no_texture_points: false    # 텍스처 없는 포인트 제외 여부

    publish_tf: True
    tf_publish_rate: 0.0       # TF 발행 빈도 (0일 경우 수동 호출 시에만 발행될 수 있음)


imu_filter:
  ros__parameters:
    # --- 필수 설정 (기본값 수정) ---
    use_mag: false           # D435i는 6축이므로 반드시 false
    world_frame: "enu"       # ROS 표준 좌표계
    publish_tf: false        # EKF(Robot Localization)를 별도로 쓴다면 반드시 false

    # --- 알고리즘 튜닝 (D435i 특화) ---
    gain: 0.05              # 추천: 0.01 ~ 0.1 사이.
                            # 낮을수록 자이로(회전) 의존도가 높아져 부드럽지만,
                            # 너무 낮으면 초기 자세를 잡는 데 오래 걸림.

    zeta: 0.001              # 자이로 바이어스 드리프트 보정. 0.0에서 약간만 높임.

    # --- 데이터 품질 설정 ---
    constant_dt: 0.0         # 0.0으로 두어 실제 패킷 타임스탬프 간격 사용
    remove_gravity_vector: false # 보통 EKF에서 중력 포함 데이터를 원하므로 false 권장

    # --- 공분산(Covariance) 최적화 ---
    # EKF나 SLAM 입력으로 쓸 때 이 값이 너무 작으면 필터가 진동함
    orientation_stddev: 0.05 # 예측 오차 범위를 약간 넉넉히 잡아 튐 현상 방지

imu_tf_broadcaster:
  ros__parameters:
    use_sim_time: false
    # [x, y, z, w] 순서로 리스트 형태로 저장
    q_offset: [0.5, -0.5, 0.5, 0.5]


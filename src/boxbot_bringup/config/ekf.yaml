### config/ekf.yaml
ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true  # 2D 평면 주행 시 true
    publish_tf: true

    # 프레임 설정
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint # 또는 base_link
    world_frame: odom

    # Odometry 입력 설정 (가제보 토픽)
    odom0: /odom
    odom0_config: [true,  true,  false, # x, y, z
                  false, false, true,  # roll, pitch, yaw
                  true,  true,  false, # vx, vy, vz
                  false, false, true,  # vroll, vpitch, vyaw
                  false, false, false] # ax, ay, az

    # IMU 입력 설정 (가제보 토픽)
    imu0: /imu/data
    imu0_config: [false, false, false, # x, y, z
                  false, false, true,  # roll, pitch, yaw
                  false, false, false, # vx, vy, vz
                  false, false, true,  # vroll, vpitch, vyaw
                  true,  true,  false] # ax, ay, az
# boxbot_bringup/config/mapper_params_online_async.yaml
slam_toolbox:
  ros__parameters:

    # ==========================================
    # 1. Plugin Params (Ceres Solver 최적화 도구 설정)
    # ==========================================
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # [수정] Ceres Solver 스레드 수 제한 (경고 해결 및 CPU 부하 감소)
    # 실제 CPU 코어 수에 맞춰 8~16 사이를 권장합니다.
    number_of_threads: 8

    # ==========================================
    # 2. ROS Parameters (기본 프레임 및 시스템 설정)
    # ==========================================
    # 2. 핵심 좌표계 (TF) 설정 - 앞서 만든 EKF 설정과 일치해야 합니다!
    odom_frame: odom            # EKF가 만들어내는 기준 프레임
    map_frame: map              # SLAM이 만들어낼 지도 프레임
    base_frame: base_footprint  # 로봇의 중심 프레임 (URDF에 따라 base_link일 수도 있음)
    scan_topic: /scan           # 가제보에서 나오는 라이다(LiDAR) 토픽 이름
    use_map_saver: true
    mode: mapping # 런치 파일에서 인자로 덮어쓸 기본값
    # 시뮬레이션 필수 설정
    use_sim_time: true          # 가제보를 사용할 때는 무조건 true여야 합니다.

    debug_logging: false
    # [수정] 스캔 데이터를 3개당 1개만 사용하여 연산 부하 감소 (메시지 드랍 방지) (1 -> 3)
    # [수정] 처리 간격을 0.1로 줄여 반응성 확보 (0.5->0.1) (throttle_scans와 조합되어 조절됨)
    throttle_scans: 3
    # TF 발행 주기를 약간 늦춰 안정성 확보 (0.02 -> 0.05)
    transform_publish_period: 0.05     # map -> odom TF 발행 주기 (0으로 설정 시 발행 안 함)
    # 지도를 더 자주 갱신 (사용자 모니터링 용이)(5.0->2.0)
    map_update_interval: 2.0           # 지도 업데이트 및 발행 주기 (초) # 지도를 갱신하는 주기 (초 단위)
    resolution: 0.05                   # 지도 해상도 (m/pixel) # 지도의 해상도 (1픽셀 = 5cm)


    # 시뮬레이션 환경에서 미세한 시간차를 무시하도록 설정 (false -> true)
    # 가제보 클록과 노드 간의 미세한 지터(Jitter)를 보정해 줄 수 있습니다.
    restamp_tf: false                  # TF 시간 스탬프를 현재 시간으로 강제 덮어쓸지 여부
    # 스캔 매칭 (Scan Matching) 파라미터
    min_laser_range: 0.12              # 스캔 최소 유효 거리 (m) # 스캔 최소 유효 거리 (m)(가제보 라이다 스펙에 맞춤)
    max_laser_range: 8.0               # 스캔 최대 유효 거리 (m) # 라이다 센서의 최대 측정 거리


    # 스캔 처리 최소 시간 간격 (초) # 스캔 데이터를 처리하는 최소 시간 간격
    # minimum_time_interval을 조금 더 늘려 확실하게 여유를 줍니다.
    minimum_time_interval: 0.2         # 0.1에서 0.2로 증가

    # TF 대기 타임아웃 (초) # TF 데이터를 기다리는 최대 시간 (0.2초 -> 1.0초 -> 2.0초)
    transform_timeout: 0.5
    # TF 버퍼 저장 시간 (초) (30.0 -> 60.0) # TF 데이터를 버퍼에 저장하는 최대 시간 (초 단위)
    # 과거 데이터를 더 오래 기억하게 해서 'earlier than...' 에러를 방지합니다.
    tf_buffer_duration: 60.0
    stack_size_to_use: 40000000        # 큰 지도를 직렬화할 때 필요한 메모리 스택 크기
    enable_interactive_mode: true      # RViz 상에서 Interactive Marker 사용 여부

    # ==========================================
    # 3. General Parameters (스캔 매칭 및 노드 생성 조건)
    # ==========================================
    use_scan_matching: true
    use_scan_barycenter: true
    # 노드 생성을 좀 더 조밀하게 변경 (0.5 -> 0.3)
    minimum_travel_distance: 0.3                  # 새 노드 생성을 위한 최소 이동 거리 (m)
    # 회전 시 노드 생성 민감도 향상 (0.5->0.3)
    minimum_travel_heading: 0.3                   # 새 노드 생성을 위한 최소 회전 각도 (rad)
    check_min_dist_and_heading_precisely: false
    # [수정] 메시지 드랍 방지를 위해 버퍼 크기 확장 (10 -> 30 -> 100)
    scan_buffer_size: 150                       # 스캔 데이터를 버퍼에 저장할 최대 개수
    scan_buffer_maximum_scan_distance: 10.0       # 버퍼에 넣을 스캔의 최대 거리 한계
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5

    # ==========================================
    # 4. Loop Closure Parameters (루프 클로저 조건) - 오차 보정
    # ==========================================
    do_loop_closing: true                    # 지나온 길을 다시 만났을 때 오차를 보정할지 여부
    loop_match_minimum_chain_size: 10        # 루프로 인정할 최소 연속 스캔 매칭 수
    loop_match_maximum_variance_coarse: 3.0  # Coarse 매칭 시 허용 최대 분산
    loop_match_minimum_response_coarse: 0.35 # Coarse 매칭 성공 커트라인 (높을수록 엄격) (0.15)
    loop_match_minimum_response_fine: 0.45   # Fine 매칭 성공 커트라인
    # [수정] 루프 탐색 범위를 살짝 줄여 연산 최적화 (3.0 -> 5.0)
    loop_search_maximum_distance: 5.0        # 루프를 찾을 때 허용하는 최대 위치 오차

    # ==========================================
    # 5. Scan Matcher Parameters (오도메트리 vs 스캔 데이터 페널티 가중치)
    # ==========================================
    distance_variance_penalty: 0.5     # 거리 분산 페널티
    angle_variance_penalty: 1.0        # 각도 분산 페널티
    minimum_distance_penalty: 0.5
    minimum_angle_penalty: 0.9

    fine_search_angle_offset: 0.00349  # 정밀 탐색 각도 범위 (rad)
    coarse_search_angle_offset: 0.349  # 거친 탐색 각도 범위 (rad)
    coarse_angle_resolution: 0.0349    # 거친 탐색 각도 해상도 (rad)

    use_response_expansion: true

    # ==========================================
    # 6. Correlation Parameters - 일반 스캔 매칭 탐색 범위
    # ==========================================
    correlation_search_space_dimension: 0.5   # 현재 위치 주변 탐색 공간 크기 (m)
    correlation_search_space_resolution: 0.01 # 탐색 그리드 해상도
    correlation_search_space_smear_deviation: 0.1 # 블러링(Smear) 편차 (노이즈 완화)

    # ==========================================
    # 7. Correlation Parameters - 루프 클로저 탐색 범위
    # ==========================================
    # [수정] 루프 탐색 반경을 현실적으로 조정 (8.0 -> 6.0)
    loop_search_space_dimension: 6.0          # 루프 클로저를 시도할 주변 탐색 반경 (m)
    loop_search_space_resolution: 0.05        # 루프 탐색 그리드 해상도
    loop_search_space_smear_deviation: 0.03